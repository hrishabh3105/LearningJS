<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SetInterval in JS</title>
</head>
<body>
    <h1>Learning setInterval</h1>
    <button id="stop">Stop</button>
    <button id="start">Start</button>
    
    <script>

        // setInterval(function(){
        //     console.log("Hrishabh")     //basic setInterval Syntax
        // },2000)
            const sayDate = function(str){
            console.log(str, Date.now());
            //listening to buttons to start and stop the setInterval
            let intervalId
        }
        document.getElementById('start').addEventListener('click',function(){
             intervalId = setInterval( sayDate,1000,"Hrishabh") //third parameter of setInterval
        })
        document.getElementById('stop').addEventListener('click', function(){
            clearInterval(intervalId)
        }) 
        


    </script>
</body>
</html>
